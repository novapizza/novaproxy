document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"flex:1\"><\u002Fdiv>\n        <div onclick=\"{{ openPalette }}\" style=\"display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--input);color:var(--muted);font:500 13px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;cursor:pointer\" style-hover=\"color:var(--text2)\">\n          <span>Commands<\u002Fspan><span style=\"font:600 11px ui-monospace,'SF Mono',Menlo,Monaco,monospace;background:var(--border);border-radius:5px;padding:2px 6px;color:var(--text2)\">⌘K<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ toggleSystemProxy }}\" style=\"display:flex;align-items:center;gap:8px;cursor:pointer;font:500 13px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:var(--text2)\">\n          <span style=\"{{ proxySwStyle }}\"><span style=\"{{ proxyKnobStyle }}\"><\u002Fspan><\u002Fspan>System Proxy\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== FLOWS SECTION ===== -->\n      <sc-if value=\"{{ showFlows }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:1;display:flex;min-height:0\">\n\n        <!-- flow list -->\n        <div style=\"width:412px;flex:none;border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;background:var(--list)\">\n          <div style=\"height:36px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--border);font:600 11px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)\">\n            <span>{{ listCountLabel }}<\u002Fspan>\n            <span onclick=\"{{ toggleGroup }}\" style=\"cursor:pointer;color:var(--text2)\">{{ groupLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1;overflow-y:auto;min-height:0\">\n            <sc-if value=\"{{ noRows }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:60px 24px;text-align:center;color:var(--faint);font:500 13px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;animation:novafade .3s\">{{ emptyMsg }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-for list=\"{{ groups }}\" as=\"g\" hint-placeholder-count=\"3\">\n              <sc-if value=\"{{ g.showHeader }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;align-items:center;gap:7px;padding:9px 14px 6px;font:700 12px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:var(--text2);position:sticky;top:0;background:var(--list);z-index:1\">\n                  <span style=\"width:6px;height:6px;border-radius:50%;background:var(--c-cyan);flex:none\"><\u002Fspan>\n                  <span style=\"overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ g.host }}<\u002Fspan>\n                  <sc-if value=\"{{ g.tls }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font:600 10px ui-monospace,'SF Mono',Menlo,Monaco,monospace;color:var(--c-green);border:1px solid rgba(56,217,150,.3);background:rgba(56,217,150,.1);border-radius:5px;padding:1px 5px\">TLS<\u002Fspan><\u002Fsc-if>\n                  <span style=\"flex:1\"><\u002Fspan>\n                  <span style=\"font:500 11px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:var(--faint)\">{{ g.count }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-for list=\"{{ g.flows }}\" as=\"f\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ f.onSelect }}\" style=\"{{ f.rowStyle }}\" style-hover=\"background:var(--hover)\">\n                  <span style=\"{{ f.badgeStyle }}\">{{ f.method }}<\u002Fspan>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"font:500 13px ui-monospace,'SF Mono',Menlo,Monaco,monospace;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ f.path }}<\u002Fdiv>\n                    <div style=\"font:400 11px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px\">{{ f.subline }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"text-align:right;flex:none\">\n                    <div style=\"{{ f.statusStyle }}\">{{ f.statusText }}<\u002Fdiv>\n                    <div style=\"font:400 11px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:var(--faint);margin-top:2px\">{{ f.timeText }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- detail -->\n        <div style=\"flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)\">\n          <sc-if value=\"{{ noSelection }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--faint)\">\n              <div style=\"width:60px;height:60px;border-radius:16px;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:26px\">≋<\u002Fdiv>\n              <div style=\"font:500 14px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:var(--muted)\">Select a flow to inspect<\u002Fdiv>\n              <div style=\"font:400 12.5px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:var(--faint)\">or press <span style=\"font:600 11px ui-monospace,'SF Mono',Menlo,Monaco,monospace;background:var(--input);padding:2px 6px;border-radius:5px;color:var(--muted)\">⌘K<\u002Fspan> for commands<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ hasSelection }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"flex:none;display:flex;flex-direction:column;border-bottom:1px solid var(--border)\">\n            <div style=\"display:flex;align-items:center;gap:10px;padding:13px 18px 11px\">\n              <span style=\"{{ sel.badgeStyle }}\">{{ sel.method }}<\u002Fspan>\n              <span style=\"flex:1;font:500 14px ui-monospace,'SF Mono',Menlo,Monaco,monospace;color:var(--text);word-break:break-all\">{{ sel.url }}<\u002Fspan>\n              <span style=\"{{ sel.statusPill }}\">{{ sel.statusText }}<\u002Fspan>\n              <div onclick=\"{{ resendSelected }}\" style=\"display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--accent);color:#fff;font:600 13px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;cursor:pointer;flex:none\" style-hover=\"filter:brightness(1.1)\">↻ Resend<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:2px;padding:0 12px\">\n              <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"5\">\n                <div onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\" style-hover=\"color:var(--text2)\">{{ t.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;overflow-y:auto;min-height:0;padding:6px 0 22px\">\n\n            <!-- Overview -->\n            <sc-if value=\"{{ tabOverview }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin:14px 18px;border:1px solid var(--border);border-radius:10px;overflow:hidden\">\n                <sc-for list=\"{{ sel.facts }}\" as=\"ft\" hint-placeholder-count=\"8\">\n                  <div style=\"background:var(--card);padding:12px 15px\">\n                    <div style=\"font:600 10.5px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue lder-count=\"4\">\n                <div style=\"display:flex;gap:16px;padding:6px 18px;font:400 12.5px ui-monospace,'SF Mono',Menlo,Monaco,monospace;border-bottom:1px solid var(--bsoft)\"><span style=\"color:var(--muted);min-width:150px\">{{ h.k }}<\u002Fspan><span style=\"color:var(--text);flex:1;word-break:break-all\">{{ h.v }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"padding:16px 18px 6px;font:700 10.5px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)\">Body<\u002Fdiv>\n              <pre style=\"margin:0 18px;padding:14px;background:#0f1217;border:1px solid var(--border);border-radius:9px;font:400 12.5px ui-monospace,'SF Mono',Menlo,Monaco,monospace;color:#a9c8ee;overflow-x:auto;white-space:pre-wrap;line-height:1.65\">{{ sel.reqBody }}<\u002Fpre>\n            <\u002Fsc-if>\n\n            <!-- Response -->\n            <sc-if value=\"{{ tabResponse }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:14px 18px 6px;font:700 10.5px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)\">Response headers<\u002Fdiv>\n              <sc-for list=\"{{ sel.resHeaders }}\" as=\"h\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;gap:16px;padding:6px 18px;font:400 12.5px ui-monospace,'SF Mono',Menlo,Monaco,monospace;border-bottom:1px solid var(--bsoft)\"><span style=\"color:var(--muted);min-width:150px\">{{ h.k }}<\u002Fspan><span style=\"color:var(--text);flex:1;word-break:break-all\">{{ h.v }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"padding:16px 18px 6px;display:flex;align-items:center;gap:10px\"><span style=\"font:700 10.5px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)\">Body<\u002Fspan><span style=\"font:500 11px ui-monospace,'SF Mono',Menlo,Monaco,monospace;color:var(--faint)\">{{ sel.bodyMeta }}<\u002Fspan><\u002Fdiv>\n              <pre style=\"margin:0 18px;padding:14px;background:#0f1217;border:1px solid var(--border);border-radius:9px;font:400 12.5px ui-monospace,'SF Mono',Menlo,Monaco,monospace;color:#c8e6c2;overflow-x:auto;white-space:pre-wrap;line-height:1.65\">{{ sel.resBody }}<\u002Fpre>\n            <\u002Fsc-if>\n\n            <!-- Timing -->\n            <sc-if value=\"{{ tabTiming }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:18px\">\n                <sc-for list=\"{{ sel.timing }}\" as=\"ph\" hint-placeholder-count=\"5\">\n                  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px\">\n                    <span style=\"width:120px;font:500 13px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:var(--muted);flex:none\">{{ ph.label }}<\u002Fspan>\n                    <div style=\"flex:1;height:16px;background:var(--input);border-radius:5px;position:relative;overflow:hidden\"><div style=\"{{ ph.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n                    <span style=\"width:56px;text-align:right;font:500 12px ui-monospace,'SF Mono',Menlo,Monaco,monospace;color:var(--text2);flex:none\">{{ ph.ms }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"margin-top:6px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font:600 13px -apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:var(--text)\"><span>Total<\u002Fspan><span style=\"font-family:ui-monospace,'SF Mono',Menlo,Monaco,monospace\">{{ sel.timeText }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- cURL -->\n            <sc-if value=\"{{ tabCurl }}\" hint-placeholder-val=\"{{ false }}\">\n              <d
